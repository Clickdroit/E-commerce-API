services:
  api:
    build: .
    container_name: ecommerce_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  nginx:
    image: nginx:alpine
    container_name: ecommerce_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /home/site-portail:/usr/share/nginx/portail:ro
    depends_on:
      - api
      - productive-frontend
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/productive-init.sql:/docker-entrypoint-initdb.d/02-productive.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
  frontend:
    build:
      context: ../E-commerce-Frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://IP_DE_TON_DROPLET/api/v1
      - NEXT_PUBLIC_WS_URL=ws://IP_DE_TON_DROPLET
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
    depends_on:
      - api
  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
  site-portail:
    build:
      context: ../site-portail
      dockerfile: Dockerfile
    container_name: site_portail
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - JWT_SECRET=P4zHnvBUA4RB3vx3dOXVFUvCRYtelcQunF9n9kTjKgS
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
    volumes:
      - portail_data:/app/server

  # ── Productive Dashboard ─────────────────────────────────────
  productive-backend:
    build:
      context: ../productive/backend
      dockerfile: Dockerfile
    container_name: productive_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/productive?schema=public
      JWT_SECRET: ${PRODUCTIVE_JWT_SECRET:-productive-jwt-secret-change-me}
      PORT: 3003
    command: >
      sh -c "npx prisma db push --skip-generate && node src/index.js"

  productive-frontend:
    build:
      context: ../productive/frontend
      dockerfile: Dockerfile
    container_name: productive_frontend
    restart: unless-stopped
    depends_on:
      - productive-backend

volumes:
  postgres_data:
  redis_data:
  portail_data:


